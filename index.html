<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRANSLATER</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f13;
      color: #e8e8f0;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #FF0058;
    }
    header p {
      color: #6b6b80;
      font-size: 0.88rem;
      margin-top: 6px;
    }

    /* ── Container principal ── */
    .container {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Style de base de chaque bloc ── */
    .block {
      background: #18181f;
      border: 1px solid #2a2a35;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .block-title {
      font-size: 0.75rem;
      color: #6b6b80;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    /* ── Bloc 1 : API Key ── */
    .key-input-container {
      display: flex;
      align-items: center;
    }
    #api-key {
      width: 100%;
      background: #1e1e27;
      border: 1.5px solid #2a2a35;
      border-radius: 8px;
      padding: 12px 14px;
      color: #e8e8f0;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #api-key:focus { border-color: #a78bfa; }

    /* ── Bloc 2 : Message Input Numéroté + Compteur ── */
    .textarea-wrapper {
      position: relative;
      display: flex;
      background: #121217;
      border: 1.5px solid #2a2a35;
      border-radius: 10px;
      padding: 12px;
      min-height: 120px;
    }
    .textarea-wrapper:focus-within {
      border-color: #a78bfa;
    }

    /* Gouttière des numéros de ligne */
    .line-numbers {
      text-align: right;
      padding-right: 12px;
      color: #4e4e61;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.05rem;
      line-height: 1.6;
      user-select: none;
      white-space: pre;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-size: 1.05rem;
      color: #e8e8f0;
      line-height: 1.6;
      font-family: inherit;
    }
    textarea::placeholder { color: #3a3a48; }
    
    .textarea-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }
    
    .char-counter {
      font-size: 0.75rem;
      color: #4e4e61;
      transition: color 0.15s;
    }
    .char-counter.limit-reached {
      color: #f87171;
      font-weight: bold;
    }

    /* Zone d'alerte sous la ligne dans le bloc */
    .limit-warning-zone {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: all 0.2s ease-in-out;
    }
    .limit-warning-zone.visible {
      max-height: 50px;
      opacity: 1;
      margin-top: 12px;
    }
    .limit-warning-line {
      border: 0;
      border-top: 1px solid #2a2a35;
      margin-bottom: 10px;
    }
    .limit-warning-text {
      color: #f87171;
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* ── Bloc 3 : Back Thought ── */
    #bt-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1.5px solid #2a2a35;
      background: transparent;
      color: #6b6b80;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      transition: all 0.15s;
      font-family: inherit;
    }
    #bt-btn.active {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.12);
      color: #a78bfa;
    }

    /* ── Bloc 4 : Target Languages ── */
    .lang-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .lang-btn {
      padding: 12px 2px;
      border-radius: 10px;
      border: 1.5px solid #2a2a35;
      background: #1e1e27;
      cursor: pointer;
      font-size: 1.4rem;
      text-align: center;
      transition: all 0.12s;
      line-height: 1;
    }
    .lang-btn:hover { border-color: #3a3a50; background: #22222e; }
    .lang-btn.selected {
      border-color: #60a5fa;
      background: rgba(96,165,250,0.12);
    }
    #selected-lang-label {
      font-size: 0.85rem;
      color: #60a5fa;
      margin-top: 14px;
      min-height: 1.2em;
      font-weight: 500;
    }

    /* ── Ajustement Responsive Mobile ── */
    @media (max-width: 480px) {
      .lang-grid {
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
      }
      .lang-btn {
        font-size: 1.25rem;
        padding: 10px 0;
      }
    }

    /* ── Bloc 5 : Action Buttons ── */
    .action-area {
      display: flex;
      gap: 12px;
    }
    .action-btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .action-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    #confirm-btn { background: #16a34a; }
    #cancel-btn { background: #dc2626; }

    /* ── Bloc 6 : Output ── */
    #output-block {
      display: none;
      border-color: #3a3a50;
    }
    #output-block.visible {
      display: block;
    }

    /* ── ALIGNEMENT DES LIGNES ── */
    .result-row {
      display: flex;
      flex-direction: row; 
      align-items: center; 
      gap: 8px;
      line-height: 1.7;
    }
    
    .result-row .emoji-prefix {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .result-row .text-content {
      display: inline;
      white-space: normal;
      word-break: break-word;
    }

    .result-row.force-column {
      flex-direction: column;
      align-items: flex-start; 
    }

    .result-main {
      font-size: 1.05rem;
      color: #e8e8f0;
    }
    .result-ipa {
      font-size: 1.05rem;
      color: #93c5fd;
      margin-top: 20px;
    }
    .result-muted {
      font-size: 1rem;
      color: #6b6b80;
      font-style: italic;
      line-height: 1.7;
    }
    .result-truth {
      font-size: 1.05rem;
      color: #e8e8f0;
      line-height: 1.7;
      margin-top: 12px;
    }
    .error-msg { 
      color: #f87171; 
      font-size: 1.05rem; 
      line-height: 1.6;
      white-space: pre-line;
    }
  </style>
</head>
<body>

  <header>
    <h1>TRANSLATER</h1>
    <p>Translate or Reveal the Hidden Truth</p>
  </header>

  <div class="container">

    <div class="block">
      <div class="block-title">GEMINI API KEY</div>
      <div class="key-input-container">
        <input type="password" id="api-key" placeholder="Enter your GEMINI API KEY" autocomplete="off" />
      </div>
    </div>

    <div class="block">
      <div class="block-title">Provide a Message</div>
      <div class="textarea-wrapper">
        <div class="line-numbers" id="line-numbers"></div>
        <textarea id="text-input" placeholder="292 . . ." maxlength="292" oninput="handleInput()"></textarea>
      </div>
      <div class="textarea-footer">
        <div class="char-counter" id="char-counter">0 / 292</div>
      </div>
      <div class="limit-warning-zone" id="limit-warning-zone">
        <hr class="limit-warning-line" />
        <div class="limit-warning-text" id="limit-warning-text">❌ It is Impossible to Enter More than 292 Characters</div>
      </div>
    </div>

    <div class="block">
      <div class="block-title">Back Thought</div>
      <button id="bt-btn" onclick="toggleBT()">🔎 Reveal the Hidden Truth</button>
    </div>

    <div class="block">
      <div class="block-title">The Target Languages</div>
      <div class="lang-grid" id="lang-grid"></div>
      <div id="selected-lang-label"></div>
    </div>

    <div class="block" style="background: transparent; border: none; box-shadow: none; padding: 0;">
      <div class="action-area">
        <button id="confirm-btn" class="action-btn" onclick="handleConfirm()">✅ Confirm</button>
        <button id="cancel-btn" class="action-btn" onclick="handleCancel()">❌ Cancel</button>
      </div>
    </div>

    <div class="block" id="output-block">
      <div class="block-title" id="output-title">Response</div>
      <div id="output-inner"></div>
    </div>

  </div>

  <script>
    const LANG_EMOJIS = {
      "🇺🇸": "American English",
      "🇲🇦": "ⵜⴰⵎⴰⵣⵉⵖⵜ",
      "🇦🇺": "Australian English",
      "🇮🇩": "Bahasa Indonesia",
      "🇲🇾": "Bahasa Melayu",
      "🇬🇧": "British English",
      "🇧🇷": "Português Brasileiro",
      "🇨🇿": "Čeština",
      "🇩🇰": "Dansk",
      "🇩🇪": "Deutsch",
      "🇪🇸": "Español",
      "🇲🇽": "Español Mexicano",
      "🇫🇷": "Français",
      "🇨🇦": "Français Québécois",
      "🇮🇪": "Gaeilge",
      "🇭🇷": "Hrvatski",
      "🇮🇹": "Italiano",
      "🇬🇱": "Kalaallisut",
      "🇭🇺": "Magyar",
      "🇳🇱": "Nederlands",
      "🇳🇴": "Norsk",
      "🇵🇱": "Polski",
      "🇵🇹": "Português",
      "🇷🇴": "Română",
      "🇫🇮": "Suomi",
      "🇸🇪": "Svenska",
      "🇵🇭": "Tagalog",
      "🇻🇳": "Tiếng Việt",
      "🇹🇷": "Türkçe",
      "🇵🇰": "اردو",
      "🇸🇦": "العربية",
      "🇩🇿": "الدارجة المغربية",
      "🇪🇬": "اللهجة المصرية",
      "🇮🇶": "اللهجة العراقية",
      "🇱🇧": "اللهجة اللبنانية",
      "🇱🇾": "اللهجة الليبية",
      "🇸🇩": "اللهجة السودانية",
      "🇧🇬": "Български",
      "🇷🇸": "Српски",
      "🇺🇦": "Українська",
      "🇷🇺": "Русский",
      "🇵🇸": "עברית",
      "🇮🇷": "فارسي",
      "🇮🇳": "हिन्दी",
      "🇹🇭": "ไทย",
      "🇮🇸": "Íslenska",
      "🇬🇷": "Ελληνικά",
      "🇨🇳": "简体中文",
      "🇯🇵": "日本語",
      "🇰🇷": "한국어"
    };

    LANG_EMOJIS["🇲🇦"] = "ⵜⴰⵎⴰⵣⵉⵖⵜ";

    const LANG_TO_EMOJI = Object.fromEntries(Object.entries(LANG_EMOJIS).map(([k,v])=>[v,k]));
    const SUPPORTED = Object.values(LANG_EMOJIS).join(", ");

    let selectedLang = null;
    let backThought = false;

    const grid = document.getElementById("lang-grid");
    if (grid) {
      Object.entries(LANG_EMOJIS).forEach(([emoji, lang]) => {
        const btn = document.createElement("button");
        btn.className = "lang-btn";
        btn.title = lang;
        btn.dataset.emoji = emoji;
        btn.textContent = emoji;
        btn.onclick = () => selectLang(emoji);
        grid.appendChild(btn);
      });
    }

    // Mesure la largeur d'un texte avec la police donnée (pour simuler le retour à la ligne du textarea)
    let _measureCanvas = null;
    function getTextWidth(text, font) {
      if (!_measureCanvas) _measureCanvas = document.createElement("canvas");
      const context = _measureCanvas.getContext("2d");
      context.font = font;
      return context.measureText(text).width;
    }

    // Simule le retour à la ligne visuel du textarea pour compter le nombre réel de lignes affichées
    // et détecter si un mot seul dépasse la largeur disponible.
    function computeWrappedLines(textarea) {
      const style = window.getComputedStyle(textarea);
      const font = `${style.fontStyle} ${style.fontWeight} ${style.fontSize} ${style.fontFamily}`;
      const paddingLeft = parseFloat(style.paddingLeft) || 0;
      const paddingRight = parseFloat(style.paddingRight) || 0;
      const availableWidth = textarea.clientWidth - paddingLeft - paddingRight;

      const rawLines = textarea.value.split('\n');
      let totalRows = 0;
      let wordTooLong = false;

      rawLines.forEach(line => {
        if (line === '') {
          totalRows += 1;
          return;
        }
        const words = line.split(' ');
        let rowCount = 1;
        let currentWidth = 0;
        words.forEach((word, idx) => {
          const wordWidth = getTextWidth(word, font);
          if (wordWidth > availableWidth) wordTooLong = true;
          const spaceWidth = idx === 0 ? 0 : getTextWidth(' ', font);
          const addedWidth = spaceWidth + wordWidth;
          if (currentWidth + addedWidth > availableWidth && currentWidth > 0) {
            rowCount += 1;
            currentWidth = wordWidth;
          } else {
            currentWidth += addedWidth;
          }
        });
        totalRows += rowCount;
      });

      return { totalRows, wordTooLong };
    }

    // Vérifie si un mot donné dépasserait la largeur disponible du textarea
    function isWordOverflow(word, textarea) {
      const style = window.getComputedStyle(textarea);
      const font = `${style.fontStyle} ${style.fontWeight} ${style.fontSize} ${style.fontFamily}`;
      const paddingLeft = parseFloat(style.paddingLeft) || 0;
      const paddingRight = parseFloat(style.paddingRight) || 0;
      const availableWidth = textarea.clientWidth - paddingLeft - paddingRight;
      return getTextWidth(word, font) > availableWidth;
    }

    // Bloque la frappe d'un caractère si le mot en cours dépasserait la ligne (comme la limite de 292 caractères).
    // Un espace (ou saut de ligne) est toujours autorisé pour terminer le mot et continuer.
    function handleWordBlock(e) {
      if (!e.inputType || !e.inputType.startsWith("insert")) return;
      const data = e.data;
      if (!data || data === " " || data === "\n") return;

      const textarea = e.target;
      const cursorPos = textarea.selectionStart;
      const value = textarea.value;
      let wordStart = cursorPos;
      while (wordStart > 0 && value[wordStart - 1] !== " " && value[wordStart - 1] !== "\n") wordStart--;
      const currentWord = value.substring(wordStart, cursorPos) + data;

      if (isWordOverflow(currentWord, textarea)) {
        e.preventDefault();
        const warningZone = document.getElementById("limit-warning-zone");
        const warningText = document.getElementById("limit-warning-text");
        if (warningZone && warningText) {
          warningText.textContent = "❌ Please, It is Impossible to Enter a World More than a Line";
          warningZone.classList.add("visible");
        }
      }
    }

    // Gestion de la saisie + mise à jour des compteurs et numéros de lignes
    function handleInput() {
      const textarea = document.getElementById("text-input");
      const counter = document.getElementById("char-counter");
      const warningZone = document.getElementById("limit-warning-zone");
      const warningText = document.getElementById("limit-warning-text");
      const lineNumbersDiv = document.getElementById("line-numbers");
      if (!textarea || !counter || !warningZone || !warningText || !lineNumbersDiv) return;

      // 1. Compteur de caractères
      const currentLength = textarea.value.length;
      counter.textContent = `${currentLength} / 292`;

      // 2. Génération automatique des numéros de lignes (compte aussi les retours à la ligne visuels)
      let wordTooLong = false;
      if (textarea.value === '') {
        lineNumbersDiv.textContent = '';
      } else {
        const { totalRows, wordTooLong: tooLong } = computeWrappedLines(textarea);
        wordTooLong = tooLong;
        let numberString = '';
        for (let i = 1; i <= totalRows; i++) {
          numberString += i + '\n';
        }
        lineNumbersDiv.textContent = numberString.trim();
      }

      // 3. Alertes
      if (currentLength >= 292) {
        counter.classList.add("limit-reached");
        warningText.textContent = "❌ It is Impossible to Enter More than 292 Characters";
        warningZone.classList.add("visible");
      } else if (wordTooLong) {
        counter.classList.remove("limit-reached");
        warningText.textContent = "❌ Please, It is Impossible to Enter a World More than a Line";
        warningZone.classList.add("visible");
      } else {
        counter.classList.remove("limit-reached");
        warningZone.classList.remove("visible");
      }
    }

    window.addEventListener("resize", handleInput);

    const textInputEl = document.getElementById("text-input");
    if (textInputEl) {
      textInputEl.addEventListener("beforeinput", handleWordBlock);
    }

    function selectLang(emoji) {
      if (selectedLang === emoji) {
        selectedLang = null;
      } else {
        selectedLang = emoji;
      }
      document.querySelectorAll(".lang-btn").forEach(b => {
        b.classList.toggle("selected", b.dataset.emoji === selectedLang);
      });
      const label = document.getElementById("selected-lang-label");
      if (label) {
        label.textContent = selectedLang ? `→ ${LANG_EMOJIS[selectedLang]}` : "";
      }
    }

    function toggleBT() {
      backThought = !backThought;
      const btn = document.getElementById("bt-btn");
      if (btn) btn.classList.toggle("active", backThought);
    }

    function createRowHTML(className, emoji, text) {
      const len = text.length;
      const isMobile = window.innerWidth <= 600;
      const limit = isMobile ? 40 : 70;
      const forceColumnClass = len > limit ? "force-column" : "";

      return `
        <div class="${className} result-row ${forceColumnClass}">
          <span class="emoji-prefix">${emoji}</span>
          <span class="text-content">${text}</span>
        </div>
      `;
    }

    async function callGemini(text, targetLang, mode, apiKey) {
      let prompt;
      const formatRules = "DO NOT use markdown formatting like asterisks (**). Do not write introduction sentences. Answer EXACTLY using the format lines below.";
      const writingSystemInstruction = "CRITICAL: You MUST write the translation or text using the native script/alphabet and natural writing system of that language. Crucially, if the language is 'ⵜⴰⵎⴰⵣⵉⵖⵜ' (Tamazight/Amazigh), you MUST write exclusively using the native Tifinagh script. If the language is Arabic, use ONLY Arabic script characters.";
      const strictLangRule = `CRITICAL LANGUAGE DETECTION: Detect the language of the Text. If the language matches EXACTLY one of the names in this list, return that name on the LANG: line: [${SUPPORTED}]. If the language is NOT in this list (for example Latin, Esperanto, etc.), you MUST write EXACTLY 'LANG: UNKNOWN'. Do not guess a neighboring language.`;

      if (mode === "translate" && targetLang) {
        prompt =
          `Do three things at once:\n` +
          `1. ${strictLangRule}\n` +
          `2. Translate the text to ${targetLang}.\n` +
          `3. Provide the exact phonetic transcription of that translation using the International Phonetic Alphabet (IPA).\n` +
          `${writingSystemInstruction}\n` +
          `${formatRules}\n\n` +
          `Reply in this exact format (3 lines only):\n` +
          `LANG: <detected language or UNKNOWN>\n` +
          `RESULT: <translation>\n` +
          `IPA: <international phonetic alphabet transcription>\n\n` +
          `Text: ${text}`;
      } else {
        const langInstruction = targetLang ? `in ${targetLang}` : "in the same language as the original text";
        prompt =
          `Do three things at once:\n` +
          `1. ${strictLangRule}\n` +
          `2. As a humorous Discord bot, reveal the hidden true meaning of this message based on Discord/gaming clichés. Reply ${langInstruction}, short and funny.\n` +
          `3. Crucial: You MUST provide the exact phonetic transcription of that hidden truth text using the International Phonetic Alphabet (IPA) on the third line.\n` +
          `${writingSystemInstruction}\n` +
          `${formatRules}\n\n` +
          `Reply in this exact format (3 lines only):\n` +
          `LANG: <detected language or UNKNOWN>\n` +
          `RESULT: <hidden truth text>\n` +
          `IPA: <international phonetic alphabet transcription>\n\n` +
          `Text: ${text}`;
      }

      let response;
      try {
        response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: { temperature: 0.1 }
            })
          }
        );
      } catch (netErr) {
        const e = new Error("NETWORK_ERROR"); throw e;
      }

      if (!response.ok) {
        if (response.status === 429) {
          const e = new Error("QUOTA_ERROR"); throw e;
        }
        if (response.status === 400 || response.status === 403) {
          const e = new Error("API_KEY_ERROR"); throw e;
        }
        const e = new Error("NETWORK_ERROR"); throw e;
      }

      const data = await response.json();
      let raw = data.candidates?.[0]?.content?.parts?.[0]?.text ?? "";
      raw = raw.replace(/\*/g, "").trim();

      const lines = raw.split("\n");
      let sourceLang = null; let result = ""; let ipa = "";
      let hasPrefixMatch = false;

      for (let line of lines) {
        let cleanLine = line.trim();
        
        if (cleanLine.toUpperCase().startsWith("LANG:")) {
          hasPrefixMatch = true;
          const detected = cleanLine.substring(5).trim();
          if (detected.toUpperCase() === "UNKNOWN") {
            sourceLang = null;
          } else {
            for (const lang of Object.values(LANG_EMOJIS)) {
              if (lang.toLowerCase() === detected.toLowerCase()) { sourceLang = lang; break; }
            }
          }
        } else if (cleanLine.toUpperCase().startsWith("RESULT:")) {
          hasPrefixMatch = true;
          result = cleanLine.substring(7)
                       .replace(/hidden truth\s*:\s*/i, "")
                       .replace(/traduction discord\s*:\s*/i, "")
                       .replace(/traduction\s*:\s*/i, "")
                       .replace(/en langage discord\s*:\s*/i, "").trim();
        } else if (cleanLine.toUpperCase().startsWith("IPA:")) {
          hasPrefixMatch = true;
          ipa = cleanLine.substring(4).trim();
        }
      }

      if (!hasPrefixMatch || !result) {
        result = raw.replace(/LANG:.*$/im, "")
                    .replace(/RESULT:/i, "")
                    .replace(/IPA:.*$/im, "")
                    .trim();
        if (!result) result = raw;
      }

      return { sourceLang, result, ipa };
    }

    function setOutput(html, isError = false) {
      const block = document.getElementById("output-block");
      const title = document.getElementById("output-title");
      const inner = document.getElementById("output-inner");
      if (inner && block && title) {
        title.textContent = isError ? "❌ ERROR" : "DONE ! ✅";
        inner.innerHTML = html;
        block.classList.add("visible");
      }
    }

    function hideOutput() {
      const block = document.getElementById("output-block");
      if (block) block.classList.remove("visible");
    }

    function setButtonsState(loading) {
      const cBtn = document.getElementById("confirm-btn");
      const xBtn = document.getElementById("cancel-btn");
      if (!cBtn || !xBtn) return;

      if (loading) {
        cBtn.disabled = true; xBtn.disabled = true;
        cBtn.innerHTML = '⏳ Processing<br>...';
      } else {
        cBtn.disabled = false; xBtn.disabled = false;
        cBtn.innerHTML = '✅ Confirm';
      }
    }

    function handleCancel() {
      setOutput(`<p class="result-main">❌ Cancelled</p>`);
      setTimeout(() => {
        const apiKeyEl = document.getElementById("api-key");
        const inputEl = document.getElementById("text-input");
        if (apiKeyEl) apiKeyEl.value = "";
        if (inputEl) inputEl.value = "";
        selectedLang = null;
        document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("selected"));
        const label = document.getElementById("selected-lang-label");
        if (label) label.textContent = "";
        backThought = false;
        const btBtn = document.getElementById("bt-btn");
        if (btBtn) btBtn.classList.remove("active");
        handleInput(); hideOutput(); 
      }, 1200); 
    }

    async function handleConfirm() {
      const apiKeyEl = document.getElementById("api-key");
      const inputEl = document.getElementById("text-input");
      const apiKey = apiKeyEl ? apiKeyEl.value.trim() : "";
      const text = inputEl ? inputEl.value.trim() : "";
      const hasAction = selectedLang || backThought;

      let missing = [];
      if (!apiKey) missing.push("Provide your GEMINI API KEY");
      if (!text) missing.push("Provide a Message");
      if (!hasAction) missing.push("Translate or Reveal the Hidden Truth");

      if (missing.length > 0) {
        let errorMsg = "⚠️\nPlease,\n";
        if (missing.length === 1) errorMsg += missing[0];
        else if (missing.length === 2) errorMsg += `${missing[0]},\nand ${missing[1]}`;
        else if (missing.length === 3) errorMsg += `${missing[0]},\n${missing[1]},\nand ${missing[2]}`;
        setOutput(`<p class="error-msg">${errorMsg}</p>`, true);
        return;
      }

      setButtonsState(true);

      try {
        const targetLang = selectedLang ? LANG_EMOJIS[selectedLang] : null;

        if (backThought && !selectedLang) {
          const { sourceLang, result } = await callGemini(text, null, "truth", apiKey);
          if (!sourceLang) {
            setOutput(`<p class="error-msg">⚠️\n  Language Not Registered</p>`, true);
            return;
          }
          setOutput(`<p class="result-main">${result}</p>`);
        }
        else if (!backThought && selectedLang) {
          const { sourceLang, result, ipa } = await callGemini(text, targetLang, "translate", apiKey);
          if (!sourceLang) {
            setOutput(`<p class="error-msg">⚠️\n  Language Not Registered</p>`, true);
            return;
          }
          
          const emoji = LANG_TO_EMOJI[sourceLang];
          if (sourceLang === targetLang) {
            setOutput(`<p class="result-muted">${emoji} Already in ${sourceLang}.</p>`);
          } else {
            let htmlResult = createRowHTML("result-main", emoji, result || "Translation error");
            if (ipa && ipa.toUpperCase() !== "N/A" && ipa.trim() !== "") {
              htmlResult += createRowHTML("result-ipa", "🌐", ipa);
            }
            setOutput(htmlResult);
          }
        }
        else if (backThought && selectedLang) {
          const { sourceLang, result: truthText, ipa = "" } = await callGemini(text, targetLang, "truth", apiKey);
          if (!sourceLang) {
            setOutput(`<p class="error-msg">⚠️\n  Language Not Registered</p>`, true);
            return;
          }
          
          const emoji = LANG_TO_EMOJI[sourceLang];
          if (sourceLang === targetLang) {
            setOutput(`<p class="result-muted">${emoji} Already in ${sourceLang}.</p><p class="result-truth">${truthText}</p>`);
          } else {
            let htmlResult = createRowHTML("result-main", emoji, truthText || "Error processing truth");
            if (ipa && ipa.toUpperCase() !== "N/A" && ipa.trim() !== "") {
              htmlResult += createRowHTML("result-ipa", "🌐", ipa);
            }
            setOutput(htmlResult);
          }
        }
      } catch (e) {
        if (e.message === "QUOTA_ERROR") {
          setOutput(`<p class="error-msg">⚠️ Please, your Plan Limit has been Reached</p>`, true);
        } else if (e.message === "API_KEY_ERROR") {
          setOutput(`<p class="error-msg">⚠️ Please, Check you GEMINI API KEY</p>`, true);
        } else {
          setOutput(`<p class="error-msg">⚠️ Please, Try Again</p>`, true);
        }
      } finally {
        setButtonsState(false);
      }
    }
  </script>
</body>
</html>
