<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRANSLATER</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f13;
      color: #e8e8f0;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #FF0058;
    }
    header p {
      color: #6b6b80;
      font-size: 0.88rem;
      margin-top: 6px;
    }

    /* ── Container principal ── */
    .container {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Style de base de chaque bloc ── */
    .block {
      background: #18181f;
      border: 1px solid #2a2a35;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .block-title {
      font-size: 0.75rem;
      color: #6b6b80;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    /* ── Bloc 1 : API Key ── */
    .key-input-container {
      display: flex;
      align-items: center;
    }
    #api-key {
      width: 100%;
      background: #1e1e27;
      border: 1.5px solid #2a2a35;
      border-radius: 8px;
      padding: 12px 14px;
      color: #e8e8f0;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #api-key:focus { border-color: #5865F2; }

    /* ── Bloc 2 : Message Input Numéroté + Compteur ── */
    .textarea-wrapper {
      position: relative;
      display: flex;
      background: #121217;
      border: 1.5px solid #2a2a35;
      border-radius: 10px;
      padding: 12px;
      min-height: 120px;
    }
    .textarea-wrapper:focus-within {
      border-color: #5865F2;
    }

    /* Gouttière des numéros de ligne */
    .line-numbers {
      flex-shrink: 0;
      min-width: 2.4em;
      text-align: right;
      padding-right: 12px;
      color: #4e4e61;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.05rem;
      line-height: 1.6;
      user-select: none;
      white-space: pre;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      overflow: hidden;
      font-size: 1.05rem;
      color: #e8e8f0;
      line-height: 1.6;
      font-family: inherit;
    }
    textarea::placeholder { color: #3a3a48; }
    
    .textarea-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }
    
    .char-counter {
      font-size: 0.75rem;
      color: #4e4e61;
      transition: color 0.15s;
    }
    .char-counter.limit-reached {
      color: #f87171;
      font-weight: bold;
    }

    /* Zone d'alerte sous la ligne dans le bloc */
    .limit-warning-zone {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: all 0.2s ease-in-out;
    }
    .limit-warning-zone.visible {
      max-height: 100px;
      opacity: 1;
      margin-top: 12px;
    }
    .limit-warning-line {
      border: 0;
      border-top: 1px solid #2a2a35;
      margin-bottom: 10px;
    }
    .limit-warning-text {
      color: #f87171;
      font-size: 0.85rem;
      font-weight: 500;
      white-space: pre-line;
    }

    /* ── Bloc 3 : Back Thought ── */
    #bt-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1.5px solid #2a2a35;
      background: transparent;
      color: #6b6b80;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      transition: all 0.15s;
      font-family: inherit;
    }
    #bt-btn.active {
      border-color: #5865F2;
      background: rgba(88, 101, 242, 0.12);
      color: #5865F2;
    }

    /* ── Bloc 4 : Target Languages ── */
    .lang-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .lang-btn {
      padding: 12px 2px;
      border-radius: 10px;
      border: 1.5px solid #2a2a35;
      background: #1e1e27;
      cursor: pointer;
      font-size: 1.4rem;
      text-align: center;
      transition: all 0.12s;
      line-height: 1;
    }
    .lang-btn:hover { border-color: #3a3a50; background: #22222e; }
    .lang-btn.selected {
      border-color: #5865F2;
      background: rgba(88, 101, 242, 0.12);
    }
    #selected-lang-label {
      font-size: 0.85rem;
      color: #5865F2;
      margin-top: 14px;
      min-height: 1.2em;
      font-weight: 500;
    }

    /* ── Ajustement Responsive Mobile ── */
    @media (max-width: 480px) {
      .lang-grid {
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
      }
      .lang-btn {
        font-size: 1.25rem;
        padding: 10px 0;
      }
    }

    /* ── Bloc 5 : Action Buttons ── */
    .action-area {
      display: flex;
      gap: 12px;
    }
    .action-btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .action-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    #confirm-btn { background: #16a34a; }
    #cancel-btn { background: #dc2626; }

    /* ── Bloc 6 : Output ── */
    #output-block {
      display: none;
      border-color: #3a3a50;
    }
    #output-block.visible {
      display: block;
    }

    /* ── ALIGNEMENT DES LIGNES ── */
    .result-row {
      display: flex;
      flex-direction: row; 
      align-items: center; 
      gap: 8px;
      line-height: 1.7;
    }
    
    .result-row .emoji-prefix {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .result-row .text-content {
      display: inline;
      white-space: normal;
      word-break: break-word;
    }

    .result-row.force-column {
      flex-direction: column;
      align-items: flex-start; 
    }

    .result-main {
      font-size: 1.05rem;
      color: #e8e8f0;
    }
    .result-ipa {
      font-size: 1.05rem;
      color: #93c5fd;
      margin-top: 20px;
    }
    .result-muted {
      font-size: 1rem;
      color: #6b6b80;
      font-style: italic;
      line-height: 1.7;
    }
    .result-truth {
      font-size: 1.05rem;
      color: #e8e8f0;
      line-height: 1.7;
      margin-top: 12px;
    }
    .result-caption {
      font-size: 0.8rem;
      color: #6b6b80;
      font-style: normal;
      margin-top: 14px;
    }
    .error-msg { 
      color: #f87171; 
      font-size: 1.05rem; 
      line-height: 1.6;
      white-space: pre-line;
    }
  </style>
</head>
<body>

  <header>
    <h1>TRANSLATER</h1>
    <p>Translate or Reveal the Hidden Truth</p>
  </header>

  <div class="container">

    <div class="block">
      <div class="block-title">GEMINI API KEY</div>
      <div class="key-input-container">
        <input type="password" id="api-key" placeholder="Provide your GEMINI API KEY" autocomplete="off" />
      </div>
    </div>

    <div class="block">
      <div class="block-title">Provide a Message</div>
      <div class="textarea-wrapper">
        <div class="line-numbers" id="line-numbers"></div>
        <textarea id="text-input" placeholder="292 . . ." maxlength="292" oninput="handleInput()"></textarea>
      </div>
      <div class="textarea-footer">
        <div class="char-counter" id="char-counter">0 / 292</div>
      </div>
      <div class="limit-warning-zone" id="limit-warning-zone">
        <hr class="limit-warning-line" />
        <div class="limit-warning-text" id="limit-warning-text">⚠️
Please,
It is Impossible to Provide More than 292 Characters</div>
      </div>
    </div>

    <div class="block">
      <div class="block-title">Back Thought</div>
      <button id="bt-btn" onclick="toggleBT()">🔎 Reveal the Hidden Truth</button>
    </div>

    <div class="block">
      <div class="block-title">The Target Languages</div>
      <div class="lang-grid" id="lang-grid"></div>
      <div id="selected-lang-label"></div>
    </div>

    <div class="block" style="background: transparent; border: none; box-shadow: none; padding: 0;">
      <div class="action-area">
        <button id="confirm-btn" class="action-btn" onclick="handleConfirm()">✅ Confirm</button>
        <button id="cancel-btn" class="action-btn" onclick="handleCancel()">❌ Cancel</button>
      </div>
    </div>

    <div class="block" id="output-block">
      <div class="block-title" id="output-title">Response</div>
      <div id="output-inner"></div>
    </div>

  </div>
