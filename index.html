<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRANSLATER</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f13;
      color: #e8e8f0;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p {
      color: #6b6b80;
      font-size: 0.88rem;
      margin-top: 6px;
    }

    /* ── API Key banner ── */
    #key-banner {
      width: 100%;
      max-width: 640px;
      background: #18181f;
      border: 1px solid #2a2a35;
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #key-banner input {
      flex: 1;
      background: #1e1e27;
      border: 1.5px solid #2a2a35;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e8e8f0;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #key-banner input:focus { border-color: #a78bfa; }
    #key-banner label { color: #6b6b80; font-size: 0.82rem; white-space: nowrap; }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 640px;
      background: #18181f;
      border: 1px solid #2a2a35;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    /* ── Textarea ── */
    .input-area {
      padding: 24px 24px 0;
    }
    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-size: 1.05rem;
      color: #e8e8f0;
      line-height: 1.6;
      font-family: inherit;
    }
    textarea::placeholder { color: #3a3a48; }

    .divider { height: 1px; background: #2a2a35; margin: 16px 0; }

    /* ── Back Thought toggle ── */
    .bt-area { padding: 0 24px 16px; }
    #bt-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1.5px solid #2a2a35;
      background: transparent;
      color: #6b6b80;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.15s;
      font-family: inherit;
    }
    #bt-btn.active {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.12);
      color: #a78bfa;
    }

    /* ── Language grid ── */
    .lang-area { padding: 0 24px 24px; }
    .lang-label {
      font-size: 0.75rem;
      color: #6b6b80;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }
    .lang-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .lang-btn {
      padding: 12px 4px;
      border-radius: 10px;
      border: 1.5px solid #2a2a35;
      background: #1e1e27;
      cursor: pointer;
      font-size: 1.5rem;
      text-align: center;
      transition: all 0.12s;
      line-height: 1;
      position: relative;
    }
    .lang-btn:hover { border-color: #3a3a50; background: #22222e; }
    .lang-btn.selected {
      border-color: #60a5fa;
      background: rgba(96,165,250,0.12);
    }

    #selected-lang-label {
      font-size: 0.8rem;
      color: #60a5fa;
      margin-top: 14px;
      min-height: 1.2em;
    }

    /* ── Action Buttons (Côte à côte) ── */
    .action-area {
      padding: 0 24px 24px;
      display: flex;
      gap: 12px;
    }
    .action-btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .action-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    
    #confirm-btn { background: #16a34a; } /* Vert */
    #cancel-btn { background: #dc2626; }  /* Rouge */

    /* ── Output ── */
    #output-section { display: none; }
    #output-section.visible { display: block; }
    .output-inner { padding: 24px; }
    .result-main {
      font-size: 1.05rem;
      color: #e8e8f0;
      line-height: 1.7;
    }
    .result-muted {
      font-size: 1rem;
      color: #6b6b80;
      font-style: italic;
      line-height: 1.7;
    }
    .result-truth {
      font-size: 1.05rem;
      color: #e8e8f0;
      line-height: 1.7;
      margin-top: 12px;
    }
    .error-msg { 
      color: #f87171; 
      font-size: 1.05rem; 
      line-height: 1.6;
      white-space: pre-line; /* Permet de conserver les sauts de ligne (\n) */
    }

    /* ── Loader ── */
    .loader {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <h1>TRANSLATER</h1>
    <p>Translate or Reveal the Hidden Truth</p>
  </header>

  <!-- API Key input -->
  <div id="key-banner">
    <label for="api-key">GEMINI API KEY</label>
    <input type="password" id="api-key" placeholder="292" autocomplete="off" />
  </div>

  <!-- Main card -->
  <div class="card">

    <!-- Text input -->
    <div class="input-area">
      <textarea id="text-input" rows="4" placeholder="Provide a Message"></textarea>
    </div>

    <div class="divider"></div>

    <!-- Back Thought -->
    <div class="bt-area">
      <button id="bt-btn" onclick="toggleBT()">🔎 Back Thought</button>
    </div>

    <!-- Language grid -->
    <div class="lang-area">
      <div class="lang-label">The Target Languages</div>
      <div class="lang-grid" id="lang-grid"></div>
      <div id="selected-lang-label"></div>
    </div>

    <!-- Action Buttons -->
    <div class="action-area">
      <button id="confirm-btn" class="action-btn" onclick="handleConfirm()">✅ Confirm</button>
      <button id="cancel-btn" class="action-btn" onclick="handleCancel()">❌ Cancel</button>
    </div>

    <!-- Output -->
    <div id="output-section">
      <div class="divider"></div>
      <div class="output-inner" id="output-inner"></div>
    </div>

  </div>

  <script>
    const LANG_EMOJIS = {
      "🇺🇸": "American English", "🇲🇦": "Amazigh", "🇸🇦": "Arabic",
      "🇦🇺": "Australian English", "🇧🇷": "Brazilian Portuguese", "🇬🇧": "British English",
      "🇧🇬": "Bulgarian", "🇨🇳": "Chinese", "🇭🇷": "Croatian",
      "🇨🇿": "Czech", "🇩🇰": "Danish", "🇳🇱": "Dutch",
      "🇪🇬": "Egyptian Arabic", "🇫🇮": "Finnish", "🇫🇷": "French",
      "🇩🇪": "German", "🇬🇷": "Greek", "🇵🇸": "Hebrew",
      "🇮🇳": "Hindi", "🇭🇺": "Hungarian", "🇮🇸": "Icelandic",
      "🇮🇩": "Indonesian", "🇮🇶": "Iraqi Arabic", "🇮🇪": "Irish",
      "🇮🇹": "Italian", "🇯🇵": "Japanese", "🇬🇱": "Kalaallisut",
      "🇰🇷": "Korean", "🇱🇧": "Lebanese Arabic", "🇱🇾": "Libyan Arabic",
      "🇩🇿": "Maghrebi Dialect", "🇲🇾": "Malay", "🇲🇽": "Mexican Spanish",
      "🇳🇴": "Norwegian", "🇮🇷": "Persian", "🇵🇱": "Polish",
      "🇵🇹": "Portuguese", "🇨🇦": "Quebec French", "🇷🇴": "Romanian",
      "🇷🇺": "Russian", "🇷🇸": "Serbian", "🇪🇸": "Spanish",
      "🇸🇩": "Sudanese Arabic", "🇸🇪": "Swedish", "🇵🇭": "Tagalog",
      "🇹🇭": "Thai", "🇹🇷": "Turkish", "🇺🇦": "Ukrainian",
      "🇵🇰": "Urdu", "🇻🇳": "Vietnamese"
    };
    const LANG_TO_EMOJI = Object.fromEntries(Object.entries(LANG_EMOJIS).map(([k,v])=>[v,k]));
    const SUPPORTED = Object.values(LANG_EMOJIS).join(", ");

    let selectedLang = null;
    let backThought = false;

    document.addEventListener("DOMContentLoaded", () => {
      const grid = document.getElementById("lang-grid");
      if (grid) {
        Object.entries(LANG_EMOJIS).forEach(([emoji, lang]) => {
          const btn = document.createElement("button");
          btn.className = "lang-btn";
          btn.title = lang;
          btn.dataset.emoji = emoji;
          btn.textContent = emoji;
          btn.onclick = () => selectLang(emoji);
          grid.appendChild(btn);
        });
      }
    });

    function selectLang(emoji) {
      if (selectedLang === emoji) {
        selectedLang = null;
      } else {
        selectedLang = emoji;
      }
      document.querySelectorAll(".lang-btn").forEach(b => {
        b.classList.toggle("selected", b.dataset.emoji === selectedLang);
      });
      const label = document.getElementById("selected-lang-label");
      if (label) {
        label.textContent = selectedLang ? `→ ${LANG_EMOJIS[selectedLang]}` : "";
      }
    }

    function toggleBT() {
      backThought = !backThought;
      const btn = document.getElementById("bt-btn");
      if (btn) btn.classList.toggle("active", backThought);
    }

    async function callGemini(text, targetLang, mode, apiKey) {
      let prompt;
      if (mode === "translate" && targetLang) {
        prompt =
          `Do two things at once:\n` +
          `1. Detect the language of this text from this list ONLY: ${SUPPORTED}. If not in list, write UNKNOWN.\n` +
          `2. Translate the text to ${targetLang}.\n\n` +
          `Reply in this exact format (2 lines only):\n` +
          `LANG: <detected language>\n` +
          `RESULT: <translation>\n\n` +
          `Text: ${text}`;
      } else {
        const langInstruction = targetLang
          ? `in ${targetLang}`
          : "in the same language as the original text";
        prompt =
          `Do two things at once:\n` +
          `1. Detect the language of this text from this list ONLY: ${SUPPORTED}. If not in list, write UNKNOWN.\n` +
          `2. As a humorous Discord bot, reveal the hidden true meaning of this message based on Discord/gaming clichés. Reply ${langInstruction}, short and funny.\n\n` +
          `Reply in this exact format (2 lines only):\n` +
          `LANG: <detected language>\n` +
          `RESULT: <hidden truth>\n\n` +
          `Text: ${text}`;
      }

      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.7 }
          })
        }
      );

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message ?? "Gemini API error");
      }

      const data = await res.json();
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text ?? "";
      const lines = raw.trim().split("\n");

      let sourceLang = null;
      let result = "";

      for (const line of lines) {
        if (line.startsWith("LANG:")) {
          const detected = line.replace("LANG:", "").trim();
          for (const lang of Object.values(LANG_EMOJIS)) {
            if (lang.toLowerCase() === detected.toLowerCase()) {
              sourceLang = lang;
              break;
            }
          }
        } else if (line.startsWith("RESULT:")) {
          result = line.replace("RESULT:", "").trim();
        }
      }

      return { sourceLang, result };
    }

    function setOutput(html) {
      const section = document.getElementById("output-section");
      const inner = document.getElementById("output-inner");
      if (inner && section) {
        inner.innerHTML = html;
        section.classList.add("visible");
      }
    }

    function setButtonsState(loading) {
      const cBtn = document.getElementById("confirm-btn");
      const xBtn = document.getElementById("cancel-btn");
      if (!cBtn || !xBtn) return;

      if (loading) {
        cBtn.disabled = true;
        xBtn.disabled = true;
        cBtn.innerHTML = '<span class="loader"></span> ⏳ Processing . . .';
      } else {
        cBtn.disabled = false;
        xBtn.disabled = false;
        cBtn.innerHTML = '✅ Confirm';
      }
    }

    function handleCancel() {
      setOutput(`<p class="result-main">❌ Cancelled</p>`);
    }

    async function handleConfirm() {
      const apiKeyEl = document.getElementById("api-key");
      const inputEl = document.getElementById("text-input");

      const apiKey = apiKeyEl ? apiKeyEl.value.trim() : "";
      const text = inputEl ? inputEl.value.trim() : "";
      const hasAction = selectedLang || backThought;

      // --- Système de Validation sur mesure ---
      let missing = [];
      if (!apiKey) missing.push("Provide your GEMINI API KEY");
      if (!text) missing.push("Provide a Message");
      if (!hasAction) missing.push("Transled or Reveal the Hidden Truth");

      if (missing.length > 0) {
        let errorMsg = "❌ Please,\n";
        if (missing.length === 1) {
          errorMsg += missing[0];
        } else if (missing.length === 2) {
          errorMsg += `${missing[0]},\nand ${missing[1]}`;
        } else if (missing.length === 3) {
          errorMsg += `${missing[0]},\n${missing[1]},\nand ${missing[2]}`;
        }
        setOutput(`<p class="error-msg">${errorMsg}</p>`);
        return;
      }

      // --- Lancement de l'API si tout est OK ---
      setButtonsState(true);

      try {
        const targetLang = selectedLang ? LANG_EMOJIS[selectedLang] : null;

        if (backThought && !selectedLang) {
          const { sourceLang, result } = await callGemini(text, null, "truth", apiKey);
          if (!sourceLang) { setOutput(`<p class="error-msg">❌ Language Not Supported</p>`); return; }
          setOutput(`<p class="result-main">${result}</p>`);
        }

        else if (!backThought && selectedLang) {
          const { sourceLang, result } = await callGemini(text, targetLang, "translate", apiKey);
          if (!sourceLang) { setOutput(`<p class="error-msg">❌ Language Not Supported</p>`); return; }
          const emoji = LANG_TO_EMOJI[sourceLang] ?? "🏳️";
          if (sourceLang === targetLang) {
            setOutput(`<p class="result-muted">${emoji} Already in ${sourceLang}.</p>`);
          } else {
            setOutput(`<p class="result-main">${emoji} ${result}</p>`);
          }
        }

        else if (backThought && selectedLang) {
          const { sourceLang, result: truthText } = await callGemini(text, null, "truth", apiKey);
          if (!sourceLang) { setOutput(`<p class="error-msg">❌ Language Not Supported</p>`); return; }
          const emoji = LANG_TO_EMOJI[sourceLang] ?? "🏳️";

          if (sourceLang === targetLang) {
            setOutput(
              `<p class="result-muted">${emoji} Already in ${sourceLang}.</p>` +
              `<p class="result-truth">${truthText}</p>`
            );
          } else {
            const { result: translatedTruth } = await callGemini(truthText, targetLang, "translate", apiKey);
            setOutput(`<p class="result-main">${emoji} ${translatedTruth}</p>`);
          }
        }

      } catch (e) {
        setOutput(`<p class="error-msg">❌ ${e.message}</p>`);
      } finally {
        setButtonsState(false);
      }
    }
  </script>
</body>
</html>
