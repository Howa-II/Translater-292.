<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRANSLATER</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f13;
      color: #e8e8f0;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p {
      color: #6b6b80;
      font-size: 0.88rem;
      margin-top: 6px;
    }

    /* ── Container principal ── */
    .container {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Style de base de chaque bloc ── */
    .block {
      background: #18181f;
      border: 1px solid #2a2a35;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .block-title {
      font-size: 0.75rem;
      color: #6b6b80;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    /* ── Bloc 1 : API Key ── */
    .key-input-container {
      display: flex;
      align-items: center;
    }
    #api-key {
      width: 100%;
      background: #1e1e27;
      border: 1.5px solid #2a2a35;
      border-radius: 8px;
      padding: 12px 14px;
      color: #e8e8f0;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #api-key:focus { border-color: #a78bfa; }

    /* ── Bloc 2 : Message Input + Compteur ── */
    .textarea-container {
      display: flex;
      flex-direction: column;
    }
    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-size: 1.05rem;
      color: #e8e8f0;
      line-height: 1.6;
      font-family: inherit;
    }
    textarea::placeholder { color: #3a3a48; }
    
    .textarea-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }
    
    .char-counter {
      font-size: 0.75rem;
      color: #4e4e61;
      transition: color 0.15s;
    }
    .char-counter.limit-reached {
      color: #f87171;
      font-weight: bold;
    }

    /* Zone d'alerte sous la ligne dans le bloc */
    .limit-warning-zone {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: all 0.2s ease-in-out;
    }
    .limit-warning-zone.visible {
      max-height: 50px;
      opacity: 1;
      margin-top: 12px;
    }
    .limit-warning-line {
      border: 0;
      border-top: 1px solid #2a2a35;
      margin-bottom: 10px;
    }
    .limit-warning-text {
      color: #f87171;
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* ── Bloc 3 : Back Thought ── */
    #bt-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1.5px solid #2a2a35;
      background: transparent;
      color: #6b6b80;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      transition: all 0.15s;
      font-family: inherit;
    }
    #bt-btn.active {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.12);
      color: #a78bfa;
    }

    /* ── Bloc 4 : Target Languages ── */
    .lang-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .lang-btn {
      padding: 12px 4px;
      border-radius: 10px;
      border: 1.5px solid #2a2a35;
      background: #1e1e27;
      cursor: pointer;
      font-size: 1.5rem;
      text-align: center;
      transition: all 0.12s;
      line-height: 1;
    }
    .lang-btn:hover { border-color: #3a3a50; background: #22222e; }
    .lang-btn.selected {
      border-color: #60a5fa;
      background: rgba(96,165,250,0.12);
    }
    #selected-lang-label {
      font-size: 0.85rem;
      color: #60a5fa;
      margin-top: 14px;
      min-height: 1.2em;
      font-weight: 500;
    }

    /* ── Bloc 5 : Action Buttons ── */
    .action-area {
      display: flex;
      gap: 12px;
    }
    .action-btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .action-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    #confirm-btn { background: #16a34a; }
    #cancel-btn { background: #dc2626; }

    /* ── Bloc 6 : Output ── */
    #output-block {
      display: none;
      border-color: #3a3a50;
    }
    #output-block.visible {
      display: block;
    }

    /* ── ALIGNEMENT ET LOGIQUE DES LIGNES CORRIGÉS ── */
    .result-row {
      display: flex;
      flex-direction: row; 
      align-items: center; 
      gap: 8px;
      line-height: 1.7;
    }
    
    .result-row .emoji-prefix {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .result-row .text-content {
      display: inline;
      white-space: normal;
      word-break: break-word;
    }

    .result-row.force-column {
      flex-direction: column;
      align-items: flex-start; 
    }

    .result-main {
      font-size: 1.05rem;
      color: #e8e8f0;
    }
    .result-ipa {
      font-size: 1.05rem;
      color: #93c5fd;
      margin-top: 20px;
    }
    .result-muted {
      font-size: 1rem;
      color: #6b6b80;
      font-style: italic;
      line-height: 1.7;
    }
    .result-truth {
      font-size: 1.05rem;
      color: #e8e8f0;
      line-height: 1.7;
      margin-top: 12px;
    }
    .error-msg { 
      color: #f87171; 
      font-size: 1.05rem; 
      line-height: 1.6;
      white-space: pre-line;
    }
  </style>
</head>
<body>

  <header>
    <h1>TRANSLATER</h1>
    <p>Translate or Reveal the Hidden Truth</p>
  </header>

  <div class="container">

    <!-- BLOC 1: GEMINI API KEY -->
    <div class="block">
      <div class="block-title">GEMINI API KEY</div>
      <div class="key-input-container">
        <input type="password" id="api-key" placeholder="Enter your GEMINI API KEY" autocomplete="off" />
      </div>
    </div>

    <!-- BLOC 2: Provide a Message -->
    <div class="block">
      <div class="block-title">Provide a Message</div>
      <div class="textarea-container">
        <textarea id="text-input" rows="4" placeholder="292 . . ." maxlength="292" oninput="updateCounter()"></textarea>
        <div class="textarea-footer">
          <div class="char-counter" id="char-counter">0 / 292</div>
        </div>
        <div class="limit-warning-zone" id="limit-warning-zone">
          <hr class="limit-warning-line" />
          <div class="limit-warning-text">❌ It is Impossible to Enter More than 292 Characters</div>
        </div>
      </div>
    </div>

    <!-- BLOC 3: Back Thought -->
    <div class="block">
      <div class="block-title">Back Thought</div>
      <button id="bt-btn" onclick="toggleBT()">🔎 Reveal the Hidden Truth</button>
    </div>

    <!-- BLOC 4: The Target Languages -->
    <div class="block">
      <div class="block-title">The Target Languages</div>
      <div class="lang-grid" id="lang-grid"></div>
      <div id="selected-lang-label"></div>
    </div>

    <!-- BLOC 5: CONFIRM / CANCEL -->
    <div class="block" style="background: transparent; border: none; box-shadow: none; padding: 0;">
      <div class="action-area">
        <button id="confirm-btn" class="action-btn" onclick="handleConfirm()">✅ Confirm</button>
        <button id="cancel-btn" class="action-btn" onclick="handleCancel()">❌ Cancel</button>
      </div>
    </div>

    <!-- BLOC 6: OUTPUT & ERRORS -->
    <div class="block" id="output-block">
      <div class="block-title" id="output-title">Response</div>
      <div id="output-inner"></div>
    </div>

  </div>

  <script>
    const LANG_EMOJIS = {
      "🇺🇸": "American English", "🇲🇦": "ⵜⴰⵎⴰⵣⵉⵖⵜ", "🇸🇦": "العربية",
      "🇦🇺": "Australian English", "🇧🇷": "Português Brasileiro", "🇬🇧": "British English",
      "🇧🇬": "Български", "🇨🇳": "中文", "🇭🇷": "Hrvatski",
      "🇨🇿": "Čeština", "🇩🇰": "Dansk", "🇳🇱": "Nederlands",
      "🇪🇬": "اللهجة المصرية", "🇫🇮": "Suomi", "🇫🇷": "Français",
      "🇩🇪": "Deutsch", "🇬🇷": "Ελληνικά", "🇵🇸": "עברית",
      "🇮🇳": "हिन्दी", "🇭🇺": "Magyar", "🇮🇸": "Íslenska",
      "🇮🇩": "Bahasa Indonesia", "🇮🇶": "اللهجة العراقية", "🇮🇪": "Gaeilge",
      "🇮🇹": "Italiano", "🇯🇵": "日本語", "🇬🇱": "Kalaallisut",
      "🇰🇷": "한국어", "🇱🇧": "اللهجة اللبنانية", "🇱🇾": "اللهجة الليبية",
      "🇩🇿": "الدارجة المغربية", "🇲🇾": "Bahasa Melayu", "🇲🇽": "Español Mexicano",
      "🇳🇴": "Norsk", "🇮🇷": "فارسی", "🇵🇱": "Polski",
      "🇵🇹": "Português", "🇨🇦": "Français Québécois", "🇷🇴": "Română",
      "🇷🇺": "Русский", "🇷🇸": "Српски", "🇪🇸": "Español",
      "🇸🇩": "اللهجة السودانية", "🇸🇪": "Svenska", "🇵🇭": "Tagalog",
      "🇹🇭": "ไทย", "🇹🇷": "Türkçe", "🇺🇦": "Українська",
      "🇵🇰": "اردو", "🇻🇳": "Tiếng Việt"
    };

    const LANG_TO_EMOJI = Object.fromEntries(Object.entries(LANG_EMOJIS).map(([k,v])=>[v,k]));
    const SUPPORTED = Object.values(LANG_EMOJIS).join(", ");

    let selectedLang = null;
    let backThought = false;

    const grid = document.getElementById("lang-grid");
    if (grid) {
      Object.entries(LANG_EMOJIS).forEach(([emoji, lang]) => {
        const btn = document.createElement("button");
        btn.className = "lang-btn";
        btn.title = lang;
        btn.dataset.emoji = emoji;
        btn.textContent = emoji;
        btn.onclick = () => selectLang(emoji);
        grid.appendChild(btn);
      });
    }

    function updateCounter() {
      const textarea = document.getElementById("text-input");
      const counter = document.getElementById("char-counter");
      const warningZone = document.getElementById("limit-warning-zone");
      if (!textarea || !counter || !warningZone) return;

      const currentLength = textarea.value.length;
      counter.textContent = `${currentLength} / 292`;

      if (currentLength >= 292) {
        counter.classList.add("limit-reached");
        warningZone.classList.add("visible");
      } else {
        counter.classList.remove("limit-reached");
        warningZone.classList.remove("visible");
      }
    }

    function selectLang(emoji) {
      if (selectedLang === emoji) {
        selectedLang = null;
      } else {
        selectedLang = emoji;
      }
      document.querySelectorAll(".lang-btn").forEach(b => {
        b.classList.toggle("selected", b.dataset.emoji === selectedLang);
      });
      const label = document.getElementById("selected-lang-label");
      if (label) {
        label.textContent = selectedLang ? `→ ${LANG_EMOJIS[selectedLang]}` : "";
      }
    }

    function toggleBT() {
      backThought = !backThought;
      const btn = document.getElementById("bt-btn");
      if (btn) btn.classList.toggle("active", backThought);
    }

    function createRowHTML(className, emoji, text) {
      const len = text.length;
      const isMobile = window.innerWidth <= 600;
      const limit = isMobile ? 40 : 70;
      const forceColumnClass = len > limit ? "force-column" : "";

      return `
        <div class="${className} result-row ${forceColumnClass}">
          <span class="emoji-prefix">${emoji}</span>
          <span class="text-content">${text}</span>
        </div>
      `;
    }

    async function callGemini(text, targetLang, mode, apiKey) {
      let prompt;
      const formatRules = "DO NOT use markdown formatting like asterisks (**). Do not write introduction sentences. Answer EXACTLY using the format lines below.";
      const writingSystemInstruction = "CRITICAL: You MUST write the translation or text using the native script/alphabet and natural writing system of that language. Crucially, if the language is 'ⵜⴰⵎⴰⵣⵉⵖⵜ' (Tamazight/Amazigh), you MUST write exclusively using the native Tifinagh script. If the language is Arabic, use ONLY Arabic script characters.";

      if (mode === "translate" && targetLang) {
        prompt =
          `Do three things at once:\n` +
          `1. Detect the language of this text from this list ONLY: ${SUPPORTED}.\n` +
          `2. Translate the text to ${targetLang}.\n` +
          `3. Provide the exact phonetic transcription of that translation using the International Phonetic Alphabet (IPA).\n` +
          `${writingSystemInstruction}\n` +
          `${formatRules}\n\n` +
          `Reply in this exact format (3 lines only):\n` +
          `LANG: <detected language>\n` +
          `RESULT: <translation>\n` +
          `IPA: <international phonetic alphabet transcription>\n\n` +
          `Text: ${text}`;
      } else {
        const langInstruction = targetLang ? `in ${targetLang}` : "in the same language as the original text";
        prompt =
          `Do three things at once:\n` +
          `1. Detect the language of this text from this list ONLY: ${SUPPORTED}.\n` +
          `2. As a humorous Discord bot, reveal the hidden true meaning of this message based on Discord/gaming clichés. Reply ${langInstruction}, short and funny.\n` +
          `3. Crucial: You MUST provide the exact phonetic transcription of that hidden truth text using the International Phonetic Alphabet (IPA) on the third line.\n` +
          `${writingSystemInstruction}\n` +
          `${formatRules}\n\n` +
          `Reply in this exact format (3 lines only):\n` +
          `LANG: <detected language>\n` +
          `RESULT: <hidden truth text>\n` +
          `IPA: <international phonetic alphabet transcription>\n\n` +
          `Text: ${text}`;
      }

      let response;
      try {
        response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: { temperature: 0.3 } // Baisse de la température pour plus de régularité dans la réponse
            })
          }
        );
      } catch (netErr) {
        const e = new Error("Network error"); e.isGeminiCrash = true; throw e;
      }

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        const msg = errData.error?.message || "Gemini API failure";
        const e = new Error(msg); e.isGeminiCrash = true; throw e;
      }

      const data = await response.json();
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text ?? "";
      const lines = raw.trim().split("\n");

      let sourceLang = null; let result = ""; let ipa = "";

      for (let line of lines) {
        // Nettoyage ultra-flexible de la ligne pour parer aux maladresses de l'IA (enlève les astérisques et espaces blancs superflus)
        let cleanLine = line.replace(/\*/g, "").trim();
        
        if (cleanLine.toUpperCase().startsWith("LANG:")) {
          const detected = cleanLine.substring(5).trim();
          for (const lang of Object.values(LANG_EMOJIS)) {
            if (lang.toLowerCase() === detected.toLowerCase()) { sourceLang = lang; break; }
          }
        } else if (cleanLine.toUpperCase().startsWith("RESULT:")) {
          result = cleanLine.substring(7)
                       .replace(/hidden truth\s*:\s*/i, "")
                       .replace(/traduction discord\s*:\s*/i, "")
                       .replace(/traduction\s*:\s*/i, "")
                       .replace(/en langage discord\s*:\s*/i, "").trim();
        } else if (cleanLine.toUpperCase().startsWith("IPA:")) {
          ipa = cleanLine.substring(4).trim();
        }
      }

      return { sourceLang, result, ipa };
    }

    function setOutput(html, isError = false) {
      const block = document.getElementById("output-block");
      const title = document.getElementById("output-title");
      const inner = document.getElementById("output-inner");
      if (inner && block && title) {
        title.textContent = isError ? "❌ ERROR" : "DONE ! ✅";
        inner.innerHTML = html;
        block.classList.add("visible");
      }
    }

    function hideOutput() {
      const block = document.getElementById("output-block");
      if (block) block.classList.remove("visible");
    }

    function setButtonsState(loading) {
      const cBtn = document.getElementById("confirm-btn");
      const xBtn = document.getElementById("cancel-btn");
      if (!cBtn || !xBtn) return;

      if (loading) {
        cBtn.disabled = true; xBtn.disabled = true;
        cBtn.innerHTML = '⏳ Processing<br>...';
      } else {
        cBtn.disabled = false; xBtn.disabled = false;
        cBtn.innerHTML = '✅ Confirm';
      }
    }

    function handleCancel() {
      setOutput(`<p class="result-main">❌ Cancelled</p>`);
      setTimeout(() => {
        const apiKeyEl = document.getElementById("api-key");
        const inputEl = document.getElementById("text-input");
        if (apiKeyEl) apiKeyEl.value = "";
        if (inputEl) inputEl.value = "";
        selectedLang = null;
        document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("selected"));
        const label = document.getElementById("selected-lang-label");
        if (label) label.textContent = "";
        backThought = false;
        const btBtn = document.getElementById("bt-btn");
        if (btBtn) btBtn.classList.remove("active");
        updateCounter(); hideOutput();
      }, 1200); 
    }

    async function handleConfirm() {
      const apiKeyEl = document.getElementById("api-key");
      const inputEl = document.getElementById("text-input");
      const apiKey = apiKeyEl ? apiKeyEl.value.trim() : "";
      const text = inputEl ? inputEl.value.trim() : "";
      const hasAction = selectedLang || backThought;

      let missing = [];
      if (!apiKey) missing.push("Provide your GEMINI API KEY");
      if (!text) missing.push("Provide a Message");
      if (!hasAction) missing.push("Translate or Reveal the Hidden Truth");

      if (missing.length > 0) {
        let errorMsg = "⚠️\nPlease,\n";
        if (missing.length === 1) errorMsg += missing[0];
        else if (missing.length === 2) errorMsg += `${missing[0]},\nand ${missing[1]}`;
        else if (missing.length === 3) errorMsg += `${missing[0]},\n${missing[1]},\nand ${missing[2]}`;
        setOutput(`<p class="error-msg">${errorMsg}</p>`, true);
        return;
      }

      setButtonsState(true);

      try {
        const targetLang = selectedLang ? LANG_EMOJIS[selectedLang] : null;

        if (backThought && !selectedLang) {
          const { sourceLang, result } = await callGemini(text, null, "truth", apiKey);
          if (!sourceLang) { setOutput(`<p class="error-msg">❌ Language Not Supported</p>`, true); return; }
          setOutput(`<p class="result-main">${result}</p>`);
        }
        else if (!backThought && selectedLang) {
          const { sourceLang, result, ipa } = await callGemini(text, targetLang, "translate", apiKey);
          if (!sourceLang) { setOutput(`<p class="error-msg">❌ Language Not Supported</p>`, true); return; }
          
          const emoji = LANG_TO_EMOJI[sourceLang] ?? "🏳️";
          
          if (sourceLang === targetLang) {
            setOutput(`<p class="result-muted">${emoji} Already in ${sourceLang}.</p>`);
          } else {
            if (!ipa || ipa.toUpperCase() === "N/A" || ipa.trim() === "") {
              setOutput(`<p class="error-msg">⚠️ Please, Try Again</p>`, true);
            } else {
              setOutput(createRowHTML("result-main", emoji, result) + createRowHTML("result-ipa", "🌐", ipa));
            }
          }
        }
        else if (backThought && selectedLang) {
          const { sourceLang, result: truthText, ipa } = await callGemini(text, targetLang, "truth", apiKey);
          if (!sourceLang) { setOutput(`<p class="error-msg">❌ Language Not Supported</p>`, true); return; }
          
          const emoji = LANG_TO_EMOJI[sourceLang] ?? "🏳️";

          if (sourceLang === targetLang) {
            setOutput(`<p class="result-muted">${emoji} Already in ${sourceLang}.</p><p class="result-truth">${truthText}</p>`);
          } else {
            if (!ipa || ipa.toUpperCase() === "N/A" || ipa.trim() === "") {
              setOutput(`<p class="error-msg">⚠️ Please, Try Again</p>`, true);
            } else {
              setOutput(createRowHTML("result-main", emoji, truthText) + createRowHTML("result-ipa", "🌐", ipa));
            }
          }
        }
      } catch (e) {
        setOutput(e.isGeminiCrash ? `<p class="error-msg">⚠️ Please, Try Again</p>` : `<p class="error-msg">❌ ${e.message}</p>`, true);
      } finally {
        setButtonsState(false);
      }
    }
  </script>
</body>
</html>
